<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="./style.css"/>
    <title>Quiz</title>
</head>
<body>
    <div class="containerNew">
        <header>
            <div class="scores-header">
                <a href="highscore.html">
                    <button class="view-high-scores" id="view-high-scores">View High Scores</button>
                </a>
            </div>
            <div class="timer">
                <p>
                    Time:
                    <span id="timer">0</span>
                </p>
            </div>
        </header>
        <main class="quiz">
            <div id="quiz-start">
                <div class="landing" id="start-screen">
                    <h1>Web Technologies Quiz Challenge</h1>
                    <p>
                        Try to answer the following Web Technologies-related<br>questions within the time limit. Keep in mind that<br>incorrect answers will penalize your<br>score/time by ten seconds!
                    </p>
                    <button id="start">Start Quiz</button>
                </div>
            </div>
            <div class="hide" id="questions">
                <h2 id="question-words"></h2>
                <div class="options" id="options"></div>
            </div>
            <div class="hide" id="quiz-end">
                <h2>All Done!</h2>
                <p>Your final score is: <span id="score-final"></span></p>
                <p>
                    Please enter your name:
                    <input type="text" id="name" maxlength="3" />
                    <button id="submit-score">Submit</button>
                </p>
            </div>
            <div id="feedback" class="feedback hide"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
